
<h2 class="sr-only">Interactive neural network particle background demo for personal website</h2>
<div style="padding: 0.5rem 0;">
  <p style="font-size: 14px; color: var(--color-text-secondary); margin: 0 0 12px;">移动鼠标试试 — 粒子会跟随你的光标形成神经网络连接</p>
  <div id="wrap" style="position: relative; width: 100%; height: 420px; border-radius: var(--border-radius-lg); overflow: hidden; cursor: crosshair;">
    <canvas id="c"></canvas>
    <div id="overlay" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); text-align: center; pointer-events: none; z-index: 2;">
      <div style="font-size: 28px; font-weight: 500; color: #fff; letter-spacing: 1px;">朱美阳</div>
      <div style="font-size: 13px; color: rgba(255,255,255,0.55); margin-top: 6px; letter-spacing: 2px;">AI训练师 / 大模型数据专家</div>
    </div>
  </div>
  <div style="display: flex; gap: 12px; margin-top: 12px; flex-wrap: wrap;">
    <div style="display: flex; align-items: center; gap: 8px;">
      <label style="font-size: 13px; color: var(--color-text-secondary); white-space: nowrap;">粒子数</label>
      <input type="range" min="40" max="200" value="100" id="cnt" style="width: 100px;">
      <span id="cnt-v" style="font-size: 13px; min-width: 28px;">100</span>
    </div>
    <div style="display: flex; align-items: center; gap: 8px;">
      <label style="font-size: 13px; color: var(--color-text-secondary); white-space: nowrap;">连线距离</label>
      <input type="range" min="60" max="200" value="120" id="dist" style="width: 100px;">
      <span id="dist-v" style="font-size: 13px; min-width: 28px;">120</span>
    </div>
    <div style="display: flex; align-items: center; gap: 8px;">
      <label style="font-size: 13px; color: var(--color-text-secondary); white-space: nowrap;">鼠标引力</label>
      <input type="range" min="0" max="100" value="50" id="grav" style="width: 100px;">
      <span id="grav-v" style="font-size: 13px; min-width: 28px;">50</span>
    </div>
    <div style="display: flex; align-items: center; gap: 8px;">
      <label style="font-size: 13px; color: var(--color-text-secondary); white-space: nowrap;">主题</label>
      <button id="theme-btn" style="font-size: 12px; padding: 4px 12px;">深蓝</button>
    </div>
  </div>
</div>
<script>
const canvas = document.getElementById('c');
const wrap = document.getElementById('wrap');
const ctx = canvas.getContext('2d');
const themes = [
  { name: '深蓝', bg: '#0a0e27', particle: [100,160,255], line: [80,130,220] },
  { name: '暗紫', bg: '#120a24', particle: [160,100,255], line: [130,80,220] },
  { name: '墨绿', bg: '#061210', particle: [60,220,170], line: [40,180,140] },
  { name: '暖橙', bg: '#1a0e05', particle: [255,160,60], line: [220,130,40] }
];
let ti = 0;
let mouse = { x: -999, y: -999 };
let particles = [];
let W, H;

function resize() {
  W = wrap.clientWidth;
  H = wrap.clientHeight;
  canvas.width = W * devicePixelRatio;
  canvas.height = H * devicePixelRatio;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
}
resize();
window.addEventListener('resize', resize);

wrap.addEventListener('mousemove', e => {
  const r = wrap.getBoundingClientRect();
  mouse.x = e.clientX - r.left;
  mouse.y = e.clientY - r.top;
});
wrap.addEventListener('mouseleave', () => { mouse.x = -999; mouse.y = -999; });

function makeParticles(n) {
  particles = [];
  for (let i = 0; i < n; i++) {
    particles.push({
      x: Math.random() * W,
      y: Math.random() * H,
      vx: (Math.random() - 0.5) * 0.6,
      vy: (Math.random() - 0.5) * 0.6,
      r: Math.random() * 1.5 + 0.8,
      pulse: Math.random() * Math.PI * 2
    });
  }
}
makeParticles(100);

function draw() {
  const theme = themes[ti];
  const maxDist = +document.getElementById('dist').value;
  const gravStr = +document.getElementById('grav').value / 1000;
  const pc = theme.particle;
  const lc = theme.line;
  const t = performance.now() * 0.001;

  ctx.fillStyle = theme.bg;
  ctx.fillRect(0, 0, W, H);

  for (const p of particles) {
    if (mouse.x > 0) {
      const dx = mouse.x - p.x;
      const dy = mouse.y - p.y;
      const d = Math.sqrt(dx * dx + dy * dy);
      if (d < 200 && d > 1) {
        p.vx += dx / d * gravStr * (200 - d) * 0.05;
        p.vy += dy / d * gravStr * (200 - d) * 0.05;
      }
    }
    p.x += p.vx;
    p.y += p.vy;
    p.vx *= 0.99;
    p.vy *= 0.99;
    if (p.x < 0) { p.x = 0; p.vx *= -1; }
    if (p.x > W) { p.x = W; p.vx *= -1; }
    if (p.y < 0) { p.y = 0; p.vy *= -1; }
    if (p.y > H) { p.y = H; p.vy *= -1; }
  }

  for (let i = 0; i < particles.length; i++) {
    for (let j = i + 1; j < particles.length; j++) {
      const a = particles[i], b = particles[j];
      const dx = a.x - b.x, dy = a.y - b.y;
      const d = Math.sqrt(dx * dx + dy * dy);
      if (d < maxDist) {
        const alpha = (1 - d / maxDist) * 0.35;
        ctx.strokeStyle = `rgba(${lc[0]},${lc[1]},${lc[2]},${alpha.toFixed(3)})`;
        ctx.lineWidth = 0.6;
        ctx.beginPath();
        ctx.moveTo(a.x, a.y);
        ctx.lineTo(b.x, b.y);
        ctx.stroke();
      }
    }
  }

  if (mouse.x > 0) {
    for (const p of particles) {
      const dx = mouse.x - p.x, dy = mouse.y - p.y;
      const d = Math.sqrt(dx * dx + dy * dy);
      if (d < 160) {
        const alpha = (1 - d / 160) * 0.5;
        ctx.strokeStyle = `rgba(${pc[0]},${pc[1]},${pc[2]},${alpha.toFixed(3)})`;
        ctx.lineWidth = 0.8;
        ctx.beginPath();
        ctx.moveTo(mouse.x, mouse.y);
        ctx.lineTo(p.x, p.y);
        ctx.stroke();
      }
    }
    ctx.beginPath();
    ctx.arc(mouse.x, mouse.y, 3, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${pc[0]},${pc[1]},${pc[2]},0.8)`;
    ctx.fill();
  }

  for (const p of particles) {
    const glow = 0.5 + 0.5 * Math.sin(t * 1.5 + p.pulse);
    const alpha = 0.4 + glow * 0.6;
    const r = p.r * (0.8 + glow * 0.4);
    ctx.beginPath();
    ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${pc[0]},${pc[1]},${pc[2]},${alpha.toFixed(3)})`;
    ctx.fill();
  }

  requestAnimationFrame(draw);
}
draw();

document.getElementById('cnt').addEventListener('input', e => {
  const v = +e.target.value;
  document.getElementById('cnt-v').textContent = v;
  makeParticles(v);
});
document.getElementById('dist').addEventListener('input', e => {
  document.getElementById('dist-v').textContent = e.target.value;
});
document.getElementById('grav').addEventListener('input', e => {
  document.getElementById('grav-v').textContent = e.target.value;
});
document.getElementById('theme-btn').addEventListener('click', () => {
  ti = (ti + 1) % themes.length;
  document.getElementById('theme-btn').textContent = themes[ti].name;
});
</script>
